<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Raspadinha</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#2b0050,#0d001a);
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.grid{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,100px);
gap:15px;
justify-content:center;
}

.card{
position:relative;
width:100px;
height:100px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.value{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

canvas{
position:absolute;
top:0;
left:0;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#7a00ff;
color:white;
font-weight:bold;
margin-top:20px;
}

#result{
margin-top:20px;
font-size:20px;
}

</style>
</head>
<body>

<h1>DEATH STORE RASPADINHA</h1>

<button onclick="startGame()">Jogar</button>

<div class="grid" id="grid"></div>

<p id="result"></p>

<script>

const premios=[
"1M 💎",
"1.2M 💎",
"1.3M 💎",
"1.4M 💎",
"1.5M 💎",
"8M 💎",
"17M 💎",
"33M 💎",
"45M 💎"
];

let scratched=false;
let valores=[];

function sortearPremio(){

return premios[Math.floor(Math.random()*premios.length)];

}

function startGame(){

const grid=document.getElementById("grid");

grid.innerHTML="";
scratched=false;
valores=[];
document.getElementById("result").innerText="";

for(let i=0;i<9;i++){

valores.push(sortearPremio());
createCard(i);

}

}

function createCard(index){

const card=document.createElement("div");
card.className="card";

const valueDiv=document.createElement("div");
valueDiv.className="value";
valueDiv.innerHTML=valores[index];

const canvas=document.createElement("canvas");

canvas.width=100;
canvas.height=100;

const ctx=canvas.getContext("2d");

ctx.fillStyle="#999";
ctx.fillRect(0,0,100,100);

ctx.globalCompositeOperation="destination-out";

let holding=false;

function scratch(e){

if(!holding || scratched) return;

e.preventDefault();

const rect=canvas.getBoundingClientRect();

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.fill();

const pixels=ctx.getImageData(0,0,100,100).data;

let count=0;

for(let i=3;i<pixels.length;i+=40){

if(pixels[i]===0) count++;

}

if(count>160){

scratched=true;

finishGame(index);

}

}

canvas.addEventListener("mousedown",()=>holding=true);
canvas.addEventListener("mouseup",()=>holding=false);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>holding=true,{passive:false});
canvas.addEventListener("touchend",()=>holding=false);
canvas.addEventListener("touchmove",scratch,{passive:false});

card.appendChild(valueDiv);
card.appendChild(canvas);

document.getElementById("grid").appendChild(card);

}

function finishGame(index){

document.querySelectorAll("canvas").forEach(c=>{
c.remove();
});

document.getElementById("result").innerHTML=
"🎉 Você ganhou: <b>"+valores[index]+"</b>";

}

</script>

</body>
</html>
